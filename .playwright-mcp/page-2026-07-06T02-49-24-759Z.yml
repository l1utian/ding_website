      - generic [ref=e35]:
        - paragraph [ref=e36]: 深圳市积科科技有限公司坐落于深圳，是一家专注于高分子环保助剂研发、生产、销售与技术服务一体化的现代化精细化工企业。公司深耕 PVC、CPVC 热稳定材料赛道多年，核心主营PVC 环保热稳定剂、CPVC 环保热稳定剂，同步自主生产赛克（三 (2 - 羟乙基) 异氰尿酸酯 / THEIC），构建起 “稳定剂成品 + 核心协效原料” 一体化产品体系，为橡塑、涂料、绝缘材料行业提供一站式环保解决方案。
        - paragraph [ref=e37]: 积科科技配备标准化自动化生产车间与独立研发实验室，组建专业化工研发与应用技术团队，持续优化合成工艺与产品配方，严控原料甄选、生产加工、成品检测全流程品质，建立完善质量管控体系，保障产品批次稳定、供货充足。依托深圳区位优势与成熟供应链，公司兼顾国内市场深耕与外贸出口，可为客户提供定制化配方研发、现场工艺指导、样品测试等配套技术支持。
        - paragraph [ref=e38]: 秉持 “科技赋能绿色橡塑，品质铸就长久合作” 的经营理念，积科科技以环保、高效、高性价比的助剂产品为核心竞争力，持续聚焦高分子新材料创新，致力成为 PVC/CPVC 环保热稳定剂与赛克领域值得信赖的源头生产服务商，携手下游产业共建低碳、安全、可持续的橡塑新材料生态。
